{% extends 'base.html' %}
{% block title %}Generate Bills - Smart Society{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm border-top border-primary border-4">
            <h3 class="mb-4"><i class="fa-solid fa-file-invoice me-2 text-primary"></i>Generate Monthly Bills</h3>
            <form method="post">
                {% csrf_token %}
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Month</label>
                        <select name="month" class="form-select" required>
                            <option value="January">January</option>
                            <option value="February">February</option>
                            <option value="March">March</option>
                            <option value="April">April</option>
                            <option value="May">May</option>
                            <option value="June">June</option>
                            <option value="July">July</option>
                            <option value="August">August</option>
                            <option value="September">September</option>
                            <option value="October">October</option>
                            <option value="November">November</option>
                            <option value="December" selected>December</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Year</label>
                        <input type="number" name="year" class="form-control" value="2024" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Maintenance Amount (₹)</label>
                    <input type="number" step="0.01" name="amount" class="form-control" placeholder="e.g. 5000.00" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Due Date</label>
                    <input type="date" name="due_date" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Generate for All Flats</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
