{% extends 'base.html' %}
{% block title %}Create Event - Smart Society{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4 shadow-sm border-top border-success border-4">
            <h3 class="mb-4"><i class="fa-solid fa-calendar-plus text-success me-2"></i>Schedule an Event</h3>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Event Title</label>
                    <input type="text" name="title" class="form-control" required placeholder="e.g. Diwali Celebration">
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Time</label>
                        <input type="time" name="time" class="form-control" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Location</label>
                    <input type="text" name="location" class="form-control" placeholder="e.g. Clubhouse" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" rows="4" class="form-control" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-success w-100 fw-bold">Publish Event</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
