{% extends 'base.html' %}
{% block title %}Post Notice - Smart Society{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4 shadow-sm border-top border-warning border-4">
            <h3 class="mb-4"><i class="fa-solid fa-bullhorn text-warning me-2"></i>Post a New Notice</h3>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Notice Title</label>
                    <input type="text" name="title" class="form-control" required>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Category</label>
                        <select name="category" class="form-select" required>
                            {% for key, name in categories %}
                                <option value="{{ key }}">{{ name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Attachment (Optional PDF/Image)</label>
                        <input type="file" name="attachment" class="form-control">
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Start Date</label>
                        <input type="date" name="start_date" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Expiry Date</label>
                        <input type="date" name="expiry_date" class="form-control" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Notice Details</label>
                    <textarea name="description" rows="5" class="form-control" required></textarea>
                </div>
                
                <button type="submit" class="btn btn-warning w-100 fw-bold"><i class="fa-solid fa-paper-plane me-2"></i>Post Notice to All Residents</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
